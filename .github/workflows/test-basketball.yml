name: Test API-SPORTS Basketball Odds

on:
  workflow_dispatch:

jobs:
  test-apisports-basketball:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Check secret exists
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          if [ -z "$FOOTBALL_API_KEY" ]; then
            echo "FOOTBALL_API_KEY is missing"
            exit 1
          else
            echo "FOOTBALL_API_KEY is available"
          fi

      - name: Run API-SPORTS basketball odds test
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python test_isports_basketball.py

      - name: Upload test output
        uses: actions/upload-artifact@v4
        with:
          name: apisports-basketball-odds-test-output
          path: apisports_basketball_odds_test_output.json
