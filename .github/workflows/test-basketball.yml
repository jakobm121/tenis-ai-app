name: Test iSports Basketball Odds

on:
  workflow_dispatch:

jobs:
  test-isports-basketball-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run iSports basketball odds test
        env:
          ISPORTS_API_KEY: ${{ secrets.ISPORTS_API_KEY }}
        run: python test_isports_basketball_odds.py

      - name: Upload iSports basketball test output
        uses: actions/upload-artifact@v4
        with:
          name: isports-basketball-odds-test-output
          path: isports_basketball_odds_test_output.json
          if-no-files-found: warn
