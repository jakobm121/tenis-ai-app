name: Test API-SPORTS Basketball Find Odds

on:
  workflow_dispatch:

jobs:
  find-basketball-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Check secret
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          if [ -z "$FOOTBALL_API_KEY" ]; then
            echo "FOOTBALL_API_KEY is missing"
            exit 1
          fi
          echo "FOOTBALL_API_KEY is available"

      - name: Run basketball odds finder
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python test_apisports_basketball_find_odds.py

      - name: Upload found odds
        uses: actions/upload-artifact@v4
        with:
          name: apisports-basketball-found-odds
          path: apisports_basketball_found_odds.json
          if-no-files-found: error
