name: Update AI77 Predictions

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: List files
        run: ls -R

      - name: Run Scout Script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python ai77_scout.py

      - name: Show predictions
        run: cat predictions.json || echo "No predictions file"

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add predictions.json
          git commit -m "Update daily predictions" || echo "No changes"
          git push
