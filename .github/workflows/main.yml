name: Update AI77 Predictions

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure predictions.json exists
        run: |
          echo "[]" > predictions.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scout Script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python ai77_scout.py

      - name: Show predictions
        run: cat predictions.json

      - name: Commit predictions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update daily predictions
          file_pattern: predictions.json
