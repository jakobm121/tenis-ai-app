name: Update AI77 Predictions

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure predictions.json exists
        run: |
          if [ ! -f predictions.json ]; then
            echo "[]" > predictions.json
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scout Script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python ai77_scout.py

      - name: Show predictions
        run: cat predictions.json

      - name: Commit predictions safely
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add predictions.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update daily predictions"

          git push || echo "Push skipped (no changes or race condition)"
