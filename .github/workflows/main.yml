name: Update Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure JSON exists
        run: |
          if [ ! -f predictions.json ]; then
            echo "[]" > predictions.json
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install deps
        run: pip install requests

      - name: Run script
        env:
          ODDS_API_KEY_V2: ${{ secrets.ODDS_API_KEY_V2 }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python ai77_scout.py

      - name: Commit predictions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update predictions
          file_pattern: predictions.json
