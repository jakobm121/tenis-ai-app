name: Update Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure JSON exists
        run: |
          if [ ! -f predictions.json ]; then echo "[]" > predictions.json; fi
          if [ ! -f results.json ]; then echo "[]" > results.json; fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install deps
        run: pip install requests

      - name: Run script
        env:
          ODDS_API_KEY_V2: ${{ secrets.ODDS_API_KEY_V2 }}
        run: python ai77_scout.py

      # 🔍 DEBUG (vidiš kaj je v fajlih)
      - name: Debug output
        run: |
          echo "=== predictions.json ==="
          cat predictions.json
          echo "=== results.json ==="
          cat results.json

      # 💥 FORCE ADD (ključni fix)
      - name: Force add files
        run: |
          git add predictions.json
          git add results.json

      # 💥 COMMIT (brez pattern bugov)
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "Update predictions & results" || echo "No changes to commit"
          git push
