name: AI77 iSports Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,14,19 * * *"

permissions:
  contents: write

jobs:
  run-isports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run iSports AI77 model
        env:
          ISPORTS_API_KEY: ${{ secrets.ISPORTS_API_KEY }}
        run: python isports_ai77.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions.json results.json isports_cache/
          git diff --cached --quiet || git commit -m "Update AI77 iSports predictions"
          git push
