name: AI77 iSports Settle

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  settle-isports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run iSports settle
        env:
          ISPORTS_API_KEY: ${{ secrets.ISPORTS_API_KEY }}
        run: python isports_settle.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --cached --quiet || git commit -m "Settle AI77 iSports results"
          git push
